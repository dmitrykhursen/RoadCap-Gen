# Generated by Gemini 

# --- DEFAULTS ---
# This list tells Hydra which files to pick from the sub-folders by default.
defaults:
  - model: llava_1_6           # Looks for configs/model/llava_1_6.yaml
  - dataset: qa_dataset        # Looks for configs/dataset/qa_dataset.yaml
  - training: lora             # Looks for configs/training/lora.yaml
  - mode: simple               # Looks for configs/mode/simple.yaml
  - _self_                     # Required by Hydra to allow overrides below

# --- GLOBAL SETTINGS ---
experiment_name: "debug_run"   # Default name, override this on CLI!
seed: 42
debug: false                   # If true, maybe load fewer samples

# --- HYDRA CONFIGURATION ---
# This controls where the logs and checkpoints are saved.
# We want: output/model_name/experiment_name/date_time
hydra:
  run:
    dir: output/${model.name}/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: output/multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${experiment_name}
